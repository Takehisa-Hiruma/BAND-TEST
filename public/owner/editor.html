<!doctype html>

<style>

  #wrap { display:grid; grid-template-columns:360px 1fr; height:100%; overflow:hidden; }
  #left { display:flex; flex-direction:column; border-right:1px solid #ccc; min-height:0; }
  #left .list-scroll { flex:1; min-height:0; overflow:auto; }
  #right { display:flex; flex-direction:column; min-height:0; overflow:hidden; }
  .right-pane { flex:1; padding:12px; overflow:auto; display:flex; flex-direction:column; gap:8px; }
  .row { display:flex; gap:8px; align-items:center; margin:4px 0; }
  label { display:flex; gap:6px; align-items:center; }
  input[type="text"], input[type="date"], select { padding:4px 6px; font:inherit; width:100%; }
  button { padding:6px 10px; border:1px solid #ccc; border-radius:4px; background:#fff; cursor:pointer; }
  button.primary { background:#0ea5e9; color:#fff; border-color:#0ea5e9; }

  /* People ビューのレイアウトを強制（他CSSより優先） */
  .view[data-view="people"] #wrap {
    display: grid !important;
    grid-template-columns: 360px 1fr !important;
    min-height: 0 !important;
    height: 100% !important;
  }

  .view[data-view="people"] #right {
    display: flex !important;
    flex-direction: column !important;
    gap: 8px !important;
    min-height: 0 !important;
    height: 100% !important;
    overflow: auto !important;
  }

</style>

<script type="module">
    // ===== コンテキスト =====
    const u = new URLSearchParams(location.search).get("u");
    const p = new URLSearchParams(location.search).get("p");
    if (!u || !p) location.href = "./index.html";

    const API_BASE =
      (location.hostname === "127.0.0.1" || location.hostname === "localhost")
        ? "http://127.0.0.1:8787"
        : "";



    const host = document.getElementById('app');
    host.innerHTML = '';
    host.appendChild(document.getElementById('event-editor-tpl').content.cloneNode(true));

    // --- ここから追記（event/people を差し込む関数） ---
    function mountEvent() {
      host.innerHTML = '';
      host.appendChild(
        document.getElementById('event-editor-tpl').content.cloneNode(true)
      );
      const root = host.firstElementChild;
      eventInit(root);
    }

    function eventInit(root) {
      // ここでは表示確認だけ。後で本来の初期化（一覧ロード等）に差し替えます。
      const status = root.querySelector('#status');
      if (status) {
        status.textContent = 'event: ready';
      }
    }

    function mountPeople() {
      host.innerHTML = '';
      host.appendChild(
        document.getElementById('people-tpl').content.cloneNode(true)
      );
      const root = host.firstElementChild;
      peopleInit(root);
    }

    function peopleInit(root) {
      // 表示確認（後で本来の描画に差し替え）
      const status = root.querySelector('#status');
      if (status) {
        status.hidden = false;
        status.textContent = 'people: ready';
      }

    // --- ここから追記：People の一覧をロードして #people-list に描画 ---
    (async () => {
      const tbody = root.querySelector('#people-list');
      if (!tbody) return;

      // 一覧取得（u/p と API_BASE はあなたの先頭定義をそのまま利用）
      const url = `${API_BASE}/owner/api/people?u=${encodeURIComponent(u)}&p=${encodeURIComponent(p)}&ts=${Date.now()}`;
      let items = [];
      try {
        const res = await fetch(url, { cache: 'no-store' });
        items = res.ok ? await res.json() : [];
      } catch (_) {
        items = [];
      }

      // 描画（escapeHtml はあなたの定義をそのまま利用）
      tbody.innerHTML = items.map(it =>
        `<tr data-id="${it.id}"><td style="width:64px">${it.id}</td><td>${escapeHtml(it.name || '')}</td></tr>`
      ).join('') || `<tr><td colspan="2">（0件）</td></tr>`;
    })();
    // --- ここまで追記 ---
        
    // --- ここから追記：一覧クリック → 詳細取得 → 右フォームへ反映 ---
    (() => {
      const tbody = root.querySelector('#people-list');
      if (!tbody) return;

      tbody.addEventListener('click', async (e) => {
        const tr = e.target.closest('tr[data-id]');
        if (!tr) return;

        const id = Number(tr.getAttribute('data-id'));
        if (!id) return;

        // 1) 詳細取得
        const url = `${API_BASE}/owner/api/people/get?u=${encodeURIComponent(u)}&p=${encodeURIComponent(p)}&id=${id}`;
        let d = null;
        try {
          const res = await fetch(url, { cache: 'no-store' });
          if (res.ok) d = await res.json();
        } catch (_) {
          d = null;
        }
        if (!d) return;

        // 2) 右フォームへ反映（root配下のみ）
        const set = (sel, v) => {
          const el = root.querySelector(sel);
          if (el) el.value = v ?? '';
        };
        set('#people-f-id',         d.id);
        set('#people-f-name',       d.name);
        set('#people-f-birthday',   d.birthday);
        set('#people-f-joined_on',  d.joined_on);
        set('#people-f-left_on',    d.left_on);
        set('#people-f-x',          d.x);
        set('#people-f-instagram',  d.instagram);
        set('#people-f-threads',    d.threads);
        set('#people-f-facebook',   d.facebook);
        set('#people-f-youtube',    d.youtube);
        set('#people-f-tiktok',     d.tiktok);

        const prev = root.querySelector('#people-preview');
        if (prev) {
          prev.textContent = [
            d.name || '',
            d.x ? `X:${d.x}` : '',
            d.instagram ? `IG:${d.instagram}` : '',
            d.youtube ? `YT:${d.youtube}` : ''
          ].filter(Boolean).join(' | ');
        }

        // 3) 選択行の視覚化（任意）
        tbody.querySelectorAll('tr[data-id].active').forEach(el => el.classList.remove('active'));
        tr.classList.add('active');
      });
    })();
    // --- ここまで追記 ---

    // --- ここから追記：People 保存ボタンの最小結線 ---
    (() => {
      const saveBtn = root.querySelector('#people-btn-save');
      if (!saveBtn) return;

      saveBtn.onclick = async () => {
        // 1) 右フォームの値を root 配下から集める
        const get = (sel) => (root.querySelector(sel)?.value?.trim() || null);
        const id         = root.querySelector('#people-f-id')?.value?.trim();

        const payload = {
          name:       get('#people-f-name') || '',
          birthday:   get('#people-f-birthday'),
          joined_on:  get('#people-f-joined_on'),
          left_on:    get('#people-f-left_on'),
          x:          get('#people-f-x'),
          instagram:  get('#people-f-instagram'),
          threads:    get('#people-f-threads'),
          facebook:   get('#people-f-facebook'),
          youtube:    get('#people-f-youtube'),
          tiktok:     get('#people-f-tiktok'),
          // preview はUI専用のため送らない
        };
        if (!payload.name) {
          const st = root.querySelector('#status');
          if (st) { st.hidden = false; st.textContent = 'name は必須です'; }
          return;
        }

        // 2) API にPOST（update or create）
        const isUpdate = !!id;
        const url = isUpdate

    // ===== スプリッタ配線 =====
    function clamp(n, min, max){ return Math.max(min, Math.min(max, n)); }
    function px(n){ return `${Math.round(n)}px`; }

    function wireSplitters(){
      const vroot = document.getElementById('app')?.firstElementChild;
      if (!vroot || vroot.getAttribute('data-view') !== 'event') return;
      // 左右：#split-h で --left-col を更新
      const gripH = document.getElementById('split-h');
      if (gripH){
        gripH.addEventListener('mousedown', e=>{
          e.preventDefault();
          const wrap = document.getElementById('wrap');
          const wrapRect = wrap.getBoundingClientRect();
          const startX = e.clientX;
          const startLeft = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--left-col')) || 520;
          const onMove = (ev)=>{
            const dx = ev.clientX - startX;
            const next = clamp(startLeft + dx, 360, Math.min(window.innerWidth*0.75, wrapRect.width-300));
            document.documentElement.style.setProperty('--left-col', px(next));
            // 保存（u/p単位で復元）
            localStorage.setItem(`editor.leftcol.${u}.${p}`, String(next));
          };
          const onUp = ()=>{ window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); };
          window.addEventListener('mousemove', onMove);
          window.addEventListener('mouseup', onUp);
        });
        // 復元
        const savedLeft = parseFloat(localStorage.getItem(`editor.leftcol.${u}.${p}`));
        if (!Number.isNaN(savedLeft)) document.documentElement.style.setProperty('--left-col', px(savedLeft));
      }

      // 右内：#split-v1 / #split-v2 で --row1 / --row2 を px 指定で更新
      const gripV1 = document.getElementById('split-v1');
      const gripV2 = document.getElementById('split-v2');
      const right  = document.getElementById('right');

      function readRows(){
        // CSS変数が%でも px 指定に直す（初回のみ）
        const cs = getComputedStyle(document.documentElement);
        const r1 = cs.getPropertyValue('--row1').trim();
        const r2 = cs.getPropertyValue('--row2').trim();
        const h  = right.getBoundingClientRect().height;
        const toPx = (v)=> v.endsWith('%') ? h * parseFloat(v)/100 : parseFloat(v||'0');
        return {h, r1: toPx(r1||'35%'), r2: toPx(r2||'35%')};
      }
      function setRows(r1px, r2px){
        const h = right.getBoundingClientRect().height;
        const min = 80;                                   // 各段の最小高
        const maxR1 = h - (min + parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--split'))*2 + min);
        const r1 = clamp(r1px, min, Math.max(min, maxR1));
        const maxR2 = h - (r1 + parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--split'))*2 + min);
        const r2 = clamp(r2px, min, Math.max(min, maxR2));
        document.documentElement.style.setProperty('--row1', px(r1));
        document.documentElement.style.setProperty('--row2', px(r2));
        localStorage.setItem(`editor.rows.${u}.${p}`, JSON.stringify([r1, r2]));
      }
      function restoreRows(){
        const saved = localStorage.getItem(`editor.rows.${u}.${p}`);
        if (saved){
          try{ const [r1,r2]=JSON.parse(saved); setRows(r1,r2); }catch{}
        }
      }
      // V1（row1 のみをドラッグ、row2 は相対維持）
      if (gripV1){
        gripV1.addEventListener('mousedown', e=>{
          e.preventDefault();
          const {r1,r2} = readRows(); const startY = e.clientY;
          const onMove = (ev)=> setRows(r1 + (ev.clientY - startY), r2);
          const onUp   = ()=>{ window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); };
          window.addEventListener('mousemove', onMove); window.addEventListener('mouseup', onUp);
        });
      }
      // V2（row2 をドラッグ）
      if (gripV2){
        gripV2.addEventListener('mousedown', e=>{
          e.preventDefault();
          const {r2} = readRows(); const startY = e.clientY;
          const onMove = (ev)=> setRows(readRows().r1, r2 + (ev.clientY - startY));
          const onUp   = ()=>{ window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); };
          window.addEventListener('mousemove', onMove); window.addEventListener('mouseup', onUp);
        });
      }
      // 復元 & リサイズ追随
      restoreRows();
      window.addEventListener('resize', ()=>{
        // 画面が大きく変わった場合でも最小高制約内に再クランプ
        const saved = localStorage.getItem(`editor.rows.${u}.${p}`);
        if (saved){ try{ const [r1,r2]=JSON.parse(saved); setRows(r1,r2); }catch{} }
        const savedLeft = parseFloat(localStorage.getItem(`editor.leftcol.${u}.${p}`));
        if (!Number.isNaN(savedLeft)){
          const max = Math.min(window.innerWidth*0.75, document.getElementById('wrap').getBoundingClientRect().width-300);
          document.documentElement.style.setProperty('--left-col', px(clamp(savedLeft, 360, max)));
        }
      });
    }

    // ===== ユーティリティ =====
    function normDate(s) {
      if (!s) return "";
      const nums = String(s).match(/\d+/g);
      if (!nums || nums.length < 3) return s;
      let [yy, mm, dd] = nums;
      if (yy.length === 2) yy = (yy >= "70" ? "19" : "20") + yy;
      yy = yy.padStart(4,"0"); mm = mm.padStart(2,"0"); dd = dd.padStart(2,"0");
      return `${yy}-${mm}-${dd}`;
    }
    function escapeHtml(s){ return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

    // ===== マスタ（venues / eras / tours / people / roles / acts / songs） =====
    let venues=[], eras=[], tours=[], people=[], roles=[], acts=[], songs=[];
    let venueById=new Map(), eraById=new Map(), tourById=new Map(), personById=new Map(), roleById=new Map(), actById=new Map(), songById=new Map();

    async function loadMasterJson(cands){
      for (const url of cands){
        try{ const r=await fetch(url,{cache:"no-store"}); if(r.ok) return await r.json(); }catch{}
      }
      return null;
    }
    function normalizeList(data){
      if (!data) return [];
      if (Array.isArray(data)) return data.map(v=>({id:String(v.id), name:v.name||v.label||String(v.id)}));
      return Object.keys(data).map(k=>({id:String(k), name:String(data[k])}));
    }
    async function loadMasters(){
      const base = `../${encodeURIComponent(u)}/${encodeURIComponent(p)}/data/`;
      venues = normalizeList(await loadMasterJson([`${base}venue.json?ts=${Date.now()}`, `${base}venues.json?ts=${Date.now()}`]));
      eras   = normalizeList(await loadMasterJson([`${base}eras.json?ts=${Date.now()}`]));
      tours  = normalizeList(await loadMasterJson([`${base}tours.json?ts=${Date.now()}`]));
      people = normalizeList(await loadMasterJson([`${base}people.json?ts=${Date.now()}`]));
      roles  = normalizeList(await loadMasterJson([`${base}roles.json?ts=${Date.now()}`]));
      acts   = normalizeList(await loadMasterJson([`${base}acts.json?ts=${Date.now()}`]));
      songs  = normalizeList(await loadMasterJson([`${base}songs.json?ts=${Date.now()}`]));

      venueById = new Map(venues.map(v=>[v.id,v.name]));
      eraById   = new Map(eras.map(v=>[v.id,v.name]));
      tourById  = new Map(tours.map(v=>[v.id,v.name]));
      personById= new Map(people.map(v=>[v.id,v.name]));
      roleById  = new Map(roles.map(v=>[v.id,v.name]));
      actById   = new Map(acts.map(v=>[v.id,v.name]));
      songById  = new Map(songs.map(v=>[v.id,v.name]));

      buildSelect('f-venue-select', venues, '（会場を選択）');
      buildSelect('f-era-select',   eras,   '（Eraを選択）');
      buildSelect('f-tour-select',  tours,  '（Tour/Seriesを選択）');
      buildSelect('ln-member',      people, '（メンバー）');
      buildSelect('ln-role',        roles,  '（役割）');
      buildSelect('band-name',      acts.length?acts:venues, '（バンド名）'); // actsが無ければ簡易代替
      buildSelect('sl-song',        songs,  '（曲を選択）');
    }
    function buildSelect(id, list, placeholder){
      const sel = document.getElementById(id);
      if(!sel) return;
      sel.innerHTML = list.length
        ? `<option value="">${placeholder}</option>` + list.map(v=>`<option value="${v.id}">${escapeHtml(v.name)}</option>`).join('')
        : `<option value="">（データ無し）</option>`;

    // ===== 初期化（events 読込 → masters → 描画） =====
    (async function init(){

// ===== 左：一覧・選択 =====
    function resolveVenueName(x){
      const vId = (x.venue_id != null ? String(x.venue_id) : (x.venue != null ? String(x.venue) : ""));
      return vId ? (venueById.get(vId) || vId) : (x.venue || "");
    }
    function render(arr){
      // const q = $("#q").value.trim();
      // ★ Event 画面以外では何もしない（People等で呼ばれても安全）
      const root = document.getElementById('app')?.firstElementChild;
      if (!root || root.getAttribute('data-view') !== 'event') return;
      // ★ 参照は root 配下だけ、かつ安全に
      const q = root.querySelector('#q')?.value?.trim() || '';
      const tbody = root.querySelector('#tbl');
      if (!tbody) return;

      const filtered = q ? arr.filter(x => (x.title||"").includes(q) || (resolveVenueName(x)||"").includes(q)) : arr;
      const sorted = [...filtered].sort((a,b)=>{
        const da=new Date(a.date||"0000-00-00"), db=new Date(b.date||"0000-00-00");
        return db - da; // 降順
      });
      tbody.innerHTML = sorted.map(x=>{
        const name = resolveVenueName(x);
        const form = x.form || "";
        return `<tr data-id="${x.id}">
          <td>${normDate(x.date||"")}</td>
          <td>${escapeHtml(x.title||"")}</td>
          <td>${escapeHtml(name||"")}</td>
          <td>${escapeHtml(form)}</td>

    async function save(){
      if(!cur){ alert("イベントを選択してください"); return; }
      const vSel = document.getElementById('f-venue-select').value;
      const eSel = document.getElementById('f-era-select').value;

    // lineup
    async function loadLineup(eventId){
      const r = await fetch(`${API_BASE}/owner/api/lineup/${eventId}?u=${u}&p=${p}`);
      lineupRows = await r.json();

    function renderLineup(){
      lineupBody.innerHTML = lineupRows.map((r,i)=>{
        return `<tr data-idx="${i}">
          <td>${escapeHtml(r.person)}</td>
          <td>${escapeHtml(r.role)}</td>
        </tr>`;
      }).join("");

      lineupBody.querySelectorAll("tr[data-idx]").forEach(tr=>{
        tr.onclick=()=>{
          lineupBody.querySelectorAll(".sel").forEach(z=>z.classList.remove("sel"));
          tr.classList.add("sel");

          const i=+tr.dataset.idx;

    function lineupAdd(){
      if(!cur){ alert("イベントを選択してください"); return; }
      const pid=$("#ln-member").value, rid=$("#ln-role").value;
      if(!pid || !rid){ alert("メンバーと役割を選択"); return; }
      lineupRows.push({event_id:cur.id, person_id:pid, role_id:rid, seq: lineupRows.length+1});
      renderLineup(); status.textContent="（lineup: 追加・未保存）";
    }
    function lineupDel(){
      const sel=lineupBody.querySelector("tr.sel"); if(!sel){ alert("行を選択"); return; }
      lineupRows.splice(+sel.dataset.idx,1); lineupRows.forEach((r,i)=>r.seq=i+1);
      renderLineup(); status.textContent="（lineup: 削除・未保存）";
    }
    function lineupMove(dir){
      const sel=lineupBody.querySelector("tr.sel"); if(!sel){ alert("行を選択"); return; }
      const i=+sel.dataset.idx, j=i+dir; if(j<0||j>=lineupRows.length) return;
      [lineupRows[i],lineupRows[j]]=[lineupRows[j],lineupRows[i]];
      lineupRows.forEach((r,k)=>r.seq=k+1); renderLineup();
      const trs=lineupBody.querySelectorAll("tr[data-idx]"); trs[j]?.classList.add("sel");
      status.textContent="（lineup: 並べ替え・未保存）";
    }
    function lineupUpdate(){
      const sel=lineupBody.querySelector("tr.sel"); if(!sel){ alert("行を選択"); return; }
      const i=+sel.dataset.idx; const pid=$("#ln-member").value, rid=$("#ln-role").value;
      if(!pid || !rid){ alert("メンバーと役割を選択"); return; }
      lineupRows[i].person_id=pid; lineupRows[i].role_id=rid; renderLineup();
      status.textContent="（lineup: 更新・未保存）";
    }

    // bandsevent
    async function loadBand(eventId){
      const r = await fetch(`${API_BASE}/owner/api/bandsevent/${eventId}?u=${u}&p=${p}`);
      bandRows = await r.json();
      renderBand();
    }
    function renderBand(){
      bandBody.innerHTML = bandRows.map((r,i)=>{
        return `<tr data-idx="${i}">
          <td>${r.seq}</td>
          <td>${escapeHtml(r.act_name)}</td>
        </tr>`;
      }).join("");

      bandBody.querySelectorAll("tr[data-idx]").forEach(tr=>{
        tr.onclick=()=>{
          bandBody.querySelectorAll(".sel").forEach(z=>z.classList.remove("sel"));
          tr.classList.add("sel");
        };
      });
    }
    function bandAdd(){
      if(!cur){ alert("イベントを選択してください"); return; }
      const v=$("#band-name").value; if(!v){ alert("バンド名を選択"); return; }
      const row={event_id:cur.id, seq: bandRows.length+1};
      // actsがあるなら id、無ければ name で保持
      if (actById.has(v)) { row.act_id=v; } else { row.act_name = ($("#band-name").selectedOptions[0]?.textContent || v); }
      bandRows.push(row); renderBand(); status.textContent="（band: 追加・未保存）";
    }
    function bandDel(){
      const sel=bandBody.querySelector("tr.sel"); if(!sel){ alert("行を選択"); return; }
      bandRows.splice(+sel.dataset.idx,1); bandRows.forEach((r,i)=>r.seq=i+1);
      renderBand(); status.textContent="（band: 削除・未保存）";
    }
    function bandMove(dir){
      const sel=bandBody.querySelector("tr.sel"); if(!sel){ alert("行を選択"); return; }
      const i=+sel.dataset.idx, j=i+dir; if(j<0||j>=bandRows.length) return;
      [bandRows[i],bandRows[j]]=[bandRows[j],bandRows[i]]; bandRows.forEach((r,k)=>r.seq=k+1);
      renderBand(); const trs=bandBody.querySelectorAll("tr[data-idx]"); trs[j]?.classList.add("sel");
      status.textContent="（band: 並べ替え・未保存）";
    }

    // setlist
    async function loadSetlist(eventId){
      const r = await fetch(`${API_BASE}/owner/api/setlist/${eventId}?u=${u}&p=${p}`);
      setlistRows = await r.json();
      renderSetlist();
    }
    function renderSetlist(){
      setlistBody.innerHTML = setlistRows.map((r,i)=>{
        return `<tr data-idx="${i}">
          <td>${r.seq}</td>
          <td>${escapeHtml(r.song_title)}</td>
          <td>${escapeHtml(r.note||"")}</td>
        </tr>`;
      }).join("");

      setlistBody.querySelectorAll("tr[data-idx]").forEach(tr=>{
        tr.onclick=()=>{
          setlistBody.querySelectorAll(".sel").forEach(z=>z.classList.remove("sel"));
          tr.classList.add("sel");

          const i=+tr.dataset.idx;
          const row=setlistRows[i];

          $("#sl-song").value    = row?.song_title ?? "";
          $("#sl-section").value = row?.section ?? "";
          $("#sl-version").value = row?.version ?? "";
        };
      });
    }
    function setlistAdd(){
      if(!cur){ alert("イベントを選択してください"); return; }
      const sid=$("#sl-song").value; if(!sid){ alert("曲を選択"); return; }
      const section=$("#sl-section").value||"";
      const version=$("#sl-version").value||"";
      setlistRows.push({event_id:cur.id, song_id:sid, seq:setlistRows.length+1, section, version});
      renderSetlist(); status.textContent="（setlist: 追加・未保存）";
    }
    function setlistDel(){
      const sel=setlistBody.querySelector("tr.sel"); if(!sel){ alert("行を選択"); return; }
      setlistRows.splice(+sel.dataset.idx,1); setlistRows.forEach((r,i)=>r.seq=i+1);
      renderSetlist(); status.textContent="（setlist: 削除・未保存）";
    }
    function setlistMove(dir){
      const sel=setlistBody.querySelector("tr.sel"); if(!sel){ alert("行を選択"); return; }
      const i=+sel.dataset.idx, j=i+dir; if(j<0||j>=setlistRows.length) return;
      [setlistRows[i],setlistRows[j]]=[setlistRows[j],setlistRows[i]];
      setlistRows.forEach((r,k)=>r.seq=k+1); renderSetlist();
      const trs=setlistBody.querySelectorAll("tr[data-idx]"); trs[j]?.classList.add("sel");
      status.textContent="（setlist: 並べ替え・未保存）";
    }
    function setlistUpdate(){
      const sel=setlistBody.querySelector("tr.sel"); if(!sel){ alert("行を選択"); return; }
      const i=+sel.dataset.idx;
      setlistRows[i].song_id = $("#sl-song").value||setlistRows[i].song_id;
      setlistRows[i].section = $("#sl-section").value||"";
      setlistRows[i].version = $("#sl-version").value||"";
      renderSetlist(); status.textContent="（setlist: 更新・未保存）";
    }
  </script>
</body>
</html>
