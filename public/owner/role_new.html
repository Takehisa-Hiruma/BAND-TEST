<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>Role Master</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="./css/common.css">
<style>
  html, body { height:100%; margin:0; }
  #wrap { display:grid; grid-template-columns:360px 1fr; height:100vh; overflow:hidden; }
  #left { display:flex; flex-direction:column; border-right:1px solid #ccc; min-height:0; }
  #left .list-scroll { flex:1; min-height:0; overflow:auto; }
  #left table { width:100%; border-collapse:collapse; table-layout:fixed; }
  #left th, #left td { padding:6px 8px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; border-bottom:1px solid #ccc; }
  #left tbody tr.active { background:#f1f5f9; }
  #right { display:flex; flex-direction:column; min-height:0; overflow:hidden; }
  .right-pane { flex:1; padding:12px; overflow:auto; display:flex; flex-direction:column; gap:10px; }
  .row { display:flex; gap:8px; align-items:center; margin:4px 0; }
  label { display:flex; gap:6px; align-items:center; }
  input[type="text"], select { padding:4px 6px; font:inherit; width:100%; }
  button { padding:6px 10px; border:1px solid #ccc; border-radius:4px; background:#fff; cursor:pointer; }
  button.primary { background:#0ea5e9; color:#fff; border-color:#0ea5e9; }
  .hint { font-size:0.9em; color:#666; margin-top:4px; }
</style>
</head>
<body>

<div id="wrap">

  <!-- 左ペイン -->
  <div id="left">
    <h3>Role</h3>
    <div class="row">
      <input id="role-q" type="search" placeholder="ロール名を検索" style="width:200px">
      <button id="role-btn-search">検索</button>
      <button id="role-btn-reload">再読込</button>
    </div>
    <hr>
    <div class="list-scroll">
      <table>
        <thead><tr><th style="width:64px">ID</th><th>Role</th></tr></thead>
        <tbody id="role-list"></tbody>
      </table>
    </div>
  </div>

  <!-- 右ペイン -->
  <div id="right">
    <header class="toolbar">
      <button id="role-btn-new">新規</button>
      <button id="role-btn-save">保存</button>
      <button id="role-btn-delete">削除</button>
    </header>
    <section class="right-pane">
      <div class="row"><label>ID <input id="role-f-id" type="text" readonly style="width:80px"></label></div>
      <div class="row"><label>Role <input id="role-f-title" type="text" style="width:320px"></label></div>
      <div id="role-audit" class="hint" hidden></div>
    </section>
  </div>

</div>

<script type="module">
const $ = s=>document.querySelector(s);
const $$= s=>Array.from(document.querySelectorAll(s));
let cur=null, page=1, size=50;

const u=new URLSearchParams(location.search).get("u");
const p=new URLSearchParams(location.search).get("p");
if(!u||!p) location.href="./index.html";

async function getJSON(path){ const r=await fetch(path); if(!r.ok) throw await r.json().catch(()=>({reason:r.statusText})); return r.json(); }
async function postJSON(path, body){ const r=await fetch(path,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body||{})}); if(!r.ok){ const data=await r.json().catch(()=>({reason:r.statusText})); const e=new Error(data.reason||"error"); e.status=r.status; e.data=data; throw e;} return r.json(); }
function escapeHtml(s){ return (s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m])); }

// 一覧描画
async function reload(){
  const q=$("#role-q")?.value?.trim()||"";
  const data=await getJSON(`/owner/api/role/list?u=${u}&p=${p}&page=${page}&size=${size}&q=${encodeURIComponent(q)}`);
  const tbody=$("#role-list"); tbody.innerHTML="";
  for(const it of data.items||[]){
    const tr=document.createElement("tr");
    tr.innerHTML=`<td>${it.id}</td><td>${escapeHtml(it.name)}</td>`;
    tr.onclick=()=>select(it.id);
    if(cur?.id===it.id) tr.classList.add("active");
    tbody.appendChild(tr);
  }
}

// 明細セット
async function select(id){
  const data=await getJSON(`/owner/api/role/get?u=${u}&p=${p}&id=${id}`);
  cur=data;
  $("#role-f-id").value=data.id??"";
  $("#role-f-title").value=data.name??"";
  $$("#role-list tr").forEach(tr=>tr.classList.toggle("active",Number(tr.firstChild.textContent)===id));
}

// 新規
function newItem(){
  cur={id:"",name:""};
  $("#role-f-id").value="";
  $("#role-f-title").value="";
  $("#role-f-title").focus();
}

// 保存
async function save(){
  const title=$("#role-f-title").value.trim();
  if(!title) return;
  if(!cur?.id){
    cur=await postJSON(`/owner/api/role/create?u=${u}&p=${p}`,{name:title});
  } else {
    await postJSON(`/owner/api/role/update?u=${u}&p=${p}`,{id:cur.id,name:title});
  }
  await reload();
  window.dispatchEvent(new CustomEvent("master-changed",{detail:{kind:"role"}}));
}

// 削除
async function del(){
  if(!cur?.id) return;
  if(!confirm(`ID ${cur.id} を削除します。よろしいですか？`)) return;
  await postJSON(`/owner/api/role/delete?u=${u}&p=${p}`,{id:cur.id});
  cur=null;
  newItem();
  await reload();
  window.dispatchEvent(new CustomEvent("master-changed",{detail:{kind:"role"}}));
}

// ハンドラ
$("#role-btn-search").onclick=()=>{ page=1; reload(); };
$("#role-btn-reload").onclick=()=>reload();
$("#role-btn-new").onclick=newItem;
$("#role-btn-save").onclick=save;
$("#role-btn-delete").onclick=del;

// 初期ロード
reload();
newItem();
</script>

</body>
</html>
