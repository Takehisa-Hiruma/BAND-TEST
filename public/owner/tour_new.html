<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>Tour Master</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="./css/common.css">
<style>
  html, body { height:100%; margin:0; }
  #wrap { display:grid; grid-template-columns:360px 1fr; height:100vh; overflow:hidden; }
  #left { display:flex; flex-direction:column; border-right:1px solid #ccc; min-height:0; }
  #left .list-scroll { flex:1; min-height:0; overflow:auto; }
  #left table { width:100%; border-collapse:collapse; table-layout:fixed; }
  #left th, #left td { padding:6px 8px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; border-bottom:1px solid #ccc; }
  #left tbody tr.active { background:#f1f5f9; }
  #right { display:flex; flex-direction:column; min-height:0; overflow:hidden; }
  .right-pane { flex:1; padding:12px; overflow:auto; display:flex; flex-direction:column; gap:10px; }
  .row { display:flex; gap:8px; align-items:center; margin:4px 0; }
  label { display:flex; gap:6px; align-items:center; }
  input[type="text"], input[type="date"], select { padding:4px 6px; font:inherit; }
  input[type="text"], input[type="date"] { width:100%; }
  button { padding:6px 10px; border:1px solid #ccc; border-radius:4px; background:#fff; cursor:pointer; }
  button.primary { background:#0ea5e9; color:#fff; border-color:#0ea5e9; }
  .hint { font-size:0.9em; color:#666; margin-top:4px; }
</style>
</head>
<body>

<div id="wrap">

  <!-- 左ペイン -->
  <div id="left">
    <h3>Tour</h3>
    <div class="row">
      <input id="tour-q" type="search" placeholder="ツアーを検索" style="width:200px">
      <button id="tour-btn-search">検索</button>
      <button id="tour-btn-reload">再読込</button>
    </div>
    <hr>
    <div class="list-scroll">
      <table>
        <thead><tr><th style="width:64px">ID</th><th>Tour</th></tr></thead>
        <tbody id="tour-list"></tbody>
      </table>
    </div>
  </div>

  <!-- 右ペイン -->
  <div id="right">
    <header class="toolbar">
      <button id="tour-btn-new">新規</button>
      <button id="tour-btn-save">保存</button>
      <button id="tour-btn-delete">削除</button>
    </header>
    <section class="right-pane">
      <div class="row"><label>ID <input id="tour-f-id" type="text" readonly style="width:80px"></label></div>
      <div class="row"><label>Name <input id="tour-f-title" type="text" style="width:320px"></label></div>
      <div class="row"><label>Start <input id="tour-f-start" type="date" style="width:180px"></label></div>
      <div class="row"><label>End <input id="tour-f-end" type="date" style="width:180px"></label></div>
      <div class="row"><label>Memo <input id="tour-f-memo" type="text" style="width:360px"></label></div>
      <div id="tour-audit" class="hint" hidden></div>
    </section>
  </div>

</div>

<script type="module">
const $ = s=>document.querySelector(s);
const $$= s=>Array.from(document.querySelectorAll(s));
let cur=null, page=1, size=50;

// 日付正規化
function normYMD(input){
  if(!input) return null;
  const s=input.trim();
  let m = s.match(/^(\d{4})-(\d{2})-(\d{2})$/); if(m) return `${m[1]}-${m[2]}-${m[3]}`;
  m = s.match(/^(\d{4})\/(\d{1,2})\/(\d{1,2})$/); if(m) return `${m[1]}-${String(m[2]).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}`;
  m = s.match(/^(\d{4})年(\d{1,2})月(\d{1,2})日$/); if(m) return `${m[1]}-${String(m[2]).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}`;
  m = s.match(/^(\d{4})[.\s](\d{1,2})[.\s](\d{1,2})$/); if(m) return `${m[1]}-${String(m[2]).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}`;
  return null;
}
function toInputDate(s){ if(!s) return ""; return /^\d{4}-\d{2}-\d{2}$/.test(s)?s:normYMD(s)||""; }
function escapeHtml(s){ return (s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m])); }

const u=new URLSearchParams(location.search).get("u");
const p=new URLSearchParams(location.search).get("p");
if(!u||!p) location.href="./index.html";

async function getJSON(path){ const r=await fetch(path); if(!r.ok) throw await r.json().catch(()=>({reason:r.statusText})); return r.json(); }
async function postJSON(path, body){ const r=await fetch(path,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body||{})}); if(!r.ok){ const data=await r.json().catch(()=>({reason:r.statusText})); const e=new Error(data.reason||"error"); e.status=r.status; e.data=data; throw e;} return r.json();}

// 一覧描画
async function reload(){
  const q=$("#tour-q")?.value?.trim()||"";
  const data=await getJSON(`/owner/api/tour/list?u=${u}&p=${p}&page=${page}&size=${size}&q=${encodeURIComponent(q)}`);
  const tbody=$("#tour-list"); tbody.innerHTML="";
  for(const it of data.items||[]){
    const tr=document.createElement("tr");
    tr.innerHTML=`<td>${it.id}</td><td>${escapeHtml(it.name)}</td>`;
    tr.onclick=()=>select(it.id);
    if(cur?.id===it.id) tr.classList.add("active");
    tbody.appendChild(tr);
  }
}

// 明細セット
async function select(id){
  const data=await getJSON(`/owner/api/tour/get?u=${u}&p=${p}&id=${id}`);
  cur=data;
  $("#tour-f-id").value=data.id??"";
  $("#tour-f-title").value=data.name??"";
  $("#tour-f-start").value=toInputDate(data.start_on);
  $("#tour-f-end").value=toInputDate(data.end_on);
  $("#tour-f-memo").value=data.memo??"";
  $$("#tour-list tr").forEach(tr=>tr.classList.toggle("active",Number(tr.firstChild.textContent)===id));
}

// 新規
function newItem(){
  cur={id:"",name:"",start_on:"",end_on:"",memo:""};
  $("#tour-f-id").value="";
  $("#tour-f-title").value="";
  $("#tour-f-start").value="";
  $("#tour-f-end").value="";
  $("#tour-f-memo").value="";
  $("#tour-f-title").focus();
}

// 保存
async function save(){
  const name=$("#tour-f-title").value.trim();
  const start=normYMD($("#tour-f-start").value);
  const end=normYMD($("#tour-f-end").value);
  const memo=$("#tour-f-memo").value.trim()||null;
  if(!name) return;
  if(!cur?.id){
    cur=await postJSON(`/owner/api/tour/create?u=${u}&p=${p}`,{name,start_on:start,end_on:end,memo});
  } else {
    await postJSON(`/owner/api/tour/update?u=${u}&p=${p}`,{id:cur.id,name,start_on:start,end_on:end,memo});
  }
  await reload();
}

// 削除
async function del(){
  if(!cur?.id) return;
  if(!confirm(`ID ${cur.id} を削除します。よろしいですか？`)) return;
  await postJSON(`/owner/api/tour/delete?u=${u}&p=${p}`,{id:cur.id});
  cur=null;
  newItem();
  await reload();
  window.dispatchEvent(new CustomEvent("master-changed",{detail:{kind:"tour"}}));
}

// ハンドラ
$("#tour-btn-search").onclick=()=>{ page=1; reload(); };
$("#tour-btn-reload").onclick=()=>reload();
$("#tour-btn-new").onclick=newItem;
$("#tour-btn-save").onclick=save;
$("#tour-btn-delete").onclick=del;

// 初期ロード
reload();
newItem();
</script>

</body>
</html>
