<script type="module">
  const username = new URLSearchParams(location.search).get("u") || "sample";

  // 昼/夜共通コード：オリジンで自動切替（本番は ''、ローカルは 127.0.0.1:8787）
  const API_BASE =
    (location.hostname === "127.0.0.1" || location.hostname === "localhost")
      ? "http://127.0.0.1:8787"
      : "";

  const listEl = document.getElementById("list");

  (async () => {
    try {
      const url = `${API_BASE}/owner/api/projects?u=${encodeURIComponent(username)}`;
      const r = await fetch(url);
      if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
      const projects = await r.json();

      listEl.innerHTML = projects.length
        ? projects.map(p => `
            <li>
              🎵 <strong>${p.display || p.project}</strong>
               — <a href="./editor.html?u=${encodeURIComponent(username)}&p=${encodeURIComponent(p.project)}">編集</a>
               / <a href="../${encodeURIComponent(username)}/${encodeURIComponent(p.project)}/">公開URL</a>
            </li>`).join("")
        : `<li>プロジェクトが見つかりません</li>`;
    } catch (e) {
      console.error(e);
      listEl.innerHTML = `<li>プロジェクト一覧の取得に失敗しました</li>`;
    }
  })();
</script>
