<!doctype html>
<meta charset="utf-8" />
<title>Owner Editor</title>
<style>
  body{font:14px system-ui;margin:0}
  header{display:flex;gap:8px;align-items:center;border-bottom:1px solid #ddd;padding:8px 12px}
  #wrap{display:flex;height:calc(100vh - 44px)}
  nav{width:320px;border-right:1px solid #eee;overflow:auto;padding:8px}
  main{flex:1;display:grid;grid-template-rows:auto 1fr;padding:8px}
  table{width:100%;border-collapse:collapse} th,td{border-bottom:1px solid #eee;padding:6px}
  input,button{font:inherit}
  label{display:block;margin:6px 0}
  .row{display:flex;gap:8px;align-items:center}
  .status{color:#555}
</style>

<header>
  <button id="btn-back">← 一覧へ</button>
  <button id="btn-save">保存</button>
  <button id="btn-publish">公開反映</button>
  <span id="status" class="status"></span>
</header>

<div id="wrap">
  <nav>
    <input id="q" placeholder="検索" style="width:100%;box-sizing:border-box;margin-bottom:8px">
    <table id="tbl"></table>
  </nav>
  <main>
    <section>
      <h2 id="title"></h2>
      <div class="row">
        <label>日付 <input id="f-date" type="date"></label>
        <label>会場ID <input id="f-venue" type="number"></label>
      </div>
      <label>タイトル <input id="f-title" style="width:60%"></label>
      <label>サブ <input id="f-sub"></label>
    </section>
    <section style="overflow:auto">
      <!-- 今はイベントだけ。セトリ／対バンは次フェーズでタブ追加 -->
    </section>
  </main>
</div>

<script type="module">
  // --- コンテキスト ----------------------------------------------------------
  const u = new URLSearchParams(location.search).get("u");
  const p = new URLSearchParams(location.search).get("p");
  if (!u || !p) location.href = "./index.html";

  // 本番（同一オリジン）とローカル（127.0.0.1:8787）で自動切替
  const API_BASE =
    (location.hostname === "127.0.0.1" || location.hostname === "localhost")
      ? "http://127.0.0.1:8787"
      : "";

  const $ = s => document.querySelector(s);
  const status = $("#status");
  $("#title").textContent = `${u} / ${p}`;

  let events = [], cur = null;

  // --- ユーティリティ ---------------------------------------------------------
  // どんな区切り/時刻付きでも YYYY-MM-DD に正規化
  function normDate(s) {
    if (!s) return "";
    const nums = String(s).match(/\d+/g);      // "2025/1/2 00:00" → ["2025","1","2","00","00"]
    if (!nums || nums.length < 3) return s;    // 年月日が取れないなら原文
    let [yy, mm, dd] = nums;
    if (yy.length === 2) yy = (yy >= "70" ? "19" : "20") + yy; // "25"→"2025" 暫定補完
    yy = yy.padStart(4, "0"); mm = mm.padStart(2, "0"); dd = dd.padStart(2, "0");
    return `${yy}-${mm}-${dd}`;
  }

  // --- 初期読込 ---------------------------------------------------------------
  (async function init() {
    try {
      const apiUrl = `${API_BASE}/owner/api/events?u=${encodeURIComponent(u)}&p=${encodeURIComponent(p)}`;
      const r = await fetch(apiUrl, { cache: "no-store" });
      if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
      events = await r.json();
      // 取り込み直後に日付を ISO に揃える（以後の描画/比較が安定）
      events = events.map(e => ({ ...e, date: normDate(e.date || "") }));
      status.textContent = "（APIから取得）";
    } catch (e) {
      console.warn("API取得に失敗 → JSONにフォールバック:", e);
      const jsonUrl = `../${encodeURIComponent(u)}/${encodeURIComponent(p)}/data/events.json?ts=${Date.now()}`;
      const r2 = await fetch(jsonUrl, { cache: "no-store" });
      if (!r2.ok) {
        status.textContent = "イベント一覧の取得に失敗しました";
        return;
      }
      events = await r2.json();
      events = events.map(e => ({ ...e, date: normDate(e.date || "") }));
      status.textContent = "（JSONから取得：保存/公開は無効）";
      // 昼の部（API未起動）は保存/公開を無効化（夜の部でAPIが立てば下のハンドラが有効になる）
      $("#btn-save").onclick = () => alert("開発中：API未起動のため保存は無効です（夜の部で有効化）");
      $("#btn-publish").onclick = () => alert("開発中：API未起動のため公開反映は無効です（夜の部で有効化）");
    }

    render(events);
    $("#btn-back").onclick = () => location.href = `./index.html?u=${encodeURIComponent(u)}`;
    // APIが起動している場合は save/publish の本処理が使われる（下で定義）
    $("#btn-save").onclick ||= save;
    $("#btn-publish").onclick ||= publish;

    $("#q").oninput = e => {
      const v = e.target.value.trim();
      const filt = v
        ? events.filter(x => (x.title || "").includes(v) || (x.venue || "").includes(v))
        : events;
      render(filt);
    };
  })();

  // --- 描画（必ず降順：新しい→古い）------------------------------------------
  function render(arr) {
    const sorted = [...arr].sort((a, b) => {
      // ここは ISO 文字列になっているので new Date でも文字列比較でも OK
      const da = new Date(a.date || "0000-00-00");
      const db = new Date(b.date || "0000-00-00");
      return db - da; // 降順
    });

    const rows = sorted.map(x =>
      `<tr data-id="${x.id}">
         <td>${normDate(x.date || '')}</td>
         <td>${x.title || ""}</td>
         <td>${x.venue || ""}</td>
       </tr>`
    ).join("");
    $("#tbl").innerHTML =
      `<tr><th>日付</th><th>タイトル</th><th>会場</th></tr>${rows}`;
    $("#tbl").querySelectorAll("tr[data-id]").forEach(tr => tr.onclick = () => pick(+tr.dataset.id));
  }

  // --- 選択 → フォーム反映 ----------------------------------------------------
  function pick(id) {
    cur = events.find(x => x.id === id);
    if (!cur) return;
    $("#f-date").value  = normDate(cur.date || "");
    $("#f-title").value = cur.title || "";
    $("#f-sub").value   = cur.sub_title || "";
    $("#f-venue").value = cur.venue_id || "";
    status.textContent = `編集中: #${cur.id}`;
  }

  // --- 保存（API起動時） -------------------------------------------------------
  async function save() {
    if (!cur) { alert("イベントを選択してください"); return; }
    const body = {
      date:      normDate($("#f-date").value) || null,  // ISOで送る
      title:     $("#f-title").value || "",
      sub_title: $("#f-sub").value || "",
      venue_id:  ($("#f-venue").value ? +$("#f-venue").value : null)
    };
    const r = await fetch(
      `${API_BASE}/owner/api/events/${cur.id}?u=${encodeURIComponent(u)}&p=${encodeURIComponent(p)}`,
      { method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) }
    );
    status.textContent = r.ok ? "保存しました" : "保存に失敗";
    if (r.ok) {
      // ローカル反映 → 再描画（即時に一覧へ反映）
      Object.assign(cur, body);
      render(events);
    }
  }

  // --- 公開反映（API起動時） ---------------------------------------------------
  async function publish() {
    status.textContent = "公開反映中…";
    const r = await fetch(
      `${API_BASE}/owner/api/build?u=${encodeURIComponent(u)}&p=${encodeURIComponent(p)}`,
      { method: "POST" }
    );
    status.textContent = r.ok ? "公開反映 完了" : "公開反映 失敗";

    // 成功時は最新を再取得して再描画（強キャッシュ回避に no-store と ts）
    if (r.ok) {
      const r2 = await fetch(`${API_BASE}/owner/api/events?u=${encodeURIComponent(u)}&p=${encodeURIComponent(p)}&ts=${Date.now()}`, { cache: "no-store" });
      if (r2.ok) {
        events = await r2.json();
        events = events.map(e => ({ ...e, date: normDate(e.date || "") }));
        render(events);
      }
    }
  }

  // --- 入力の“手修正”を避ける（必要なら有効化） -------------------------------
  // ピッカーのみ許可したい場合は下 2 行のコメントアウトを外す
  // const fDate = document.getElementById('f-date');
  // fDate.addEventListener('keydown', e => e.preventDefault()), fDate.addEventListener('paste', e => e.preventDefault());
</script>
