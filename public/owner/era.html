<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>Era Master</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./css/common.css">
  <style>
    /* ページ骨格（左：360px固定／右：可変） */
    html, body { height: 100%; }
    body {
      display: grid;
      grid-template-columns: 360px 1fr;
      min-height: 0;
    }

    /* 左ペイン：上は自然固定、下だけスクロール */
    aside { display: flex; flex-direction: column; min-height: 0; }
    aside .list-scroll { flex: 1; min-height: 0; overflow: auto; }

    /* 右ペイン */
    main { min-height: 0; overflow: hidden; display: flex; flex-direction: column; }
    .right-pane { padding: 12px; overflow: auto; display: flex; flex-direction: column; gap: 10px; }

    /* 表（押し出し防止） */
    aside table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    aside th, aside td { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    tbody tr.active { background: #f1f5f9; }
  </style>
</head>
<body>

  <aside>
    <h3>Era</h3>

    <div class="row">
      <input id="q" type="search" placeholder="章・期を検索" style="width:200px">
      <button id="btn-search">検索</button>
      <button id="btn-reload">再読込</button>
    </div>

    <hr>

    <!-- 下だけスクロール -->
    <div class="list-scroll">
      <table>
        <thead>
          <tr><th style="width:64px">ID</th><th>Era</th></tr>
        </thead>
        <tbody id="list"></tbody>
      </table>
    </div>
  </aside>

  <main>
    <header class="toolbar">
      <button id="btn-new">新規</button>
      <button id="btn-save">保存</button>
      <button id="btn-delete">削除</button>
    </header>
    <section class="right-pane">
      <div class="row"><label>ID <input id="f-id" type="text" readonly style="width:80px"></label></div>
      <div class="row"><label>Name <input id="f-title" type="text" style="width:320px"></label></div>
      <div class="row"><label>Start <input id="f-start" type="date"  style="width:180px"></label></div>
      <div class="row"><label>End   <input id="f-end"   type="date"  style="width:180px"></label></div>
      <div class="row"><label>Memo  <input id="f-memo"  type="text"  style="width:360px"></label></div>
      <div id="audit" class="hint" hidden></div>
    </section>
  </main>

  <script type="module">
    // ===== コンテキスト =====
    const u = new URLSearchParams(location.search).get("u");
    const p = new URLSearchParams(location.search).get("p");
    if (!u || !p) location.href = "./index.html";

    const API_BASE =
      (location.hostname === "127.0.0.1" || location.hostname === "localhost")
        ? "http://127.0.0.1:8787"
        : "";

    // ===== 小物 =====
    const $  = (s) => document.querySelector(s);
    const $$ = (s) => Array.from(document.querySelectorAll(s));
    const listTbody = $("#list");
    let cur = null, page = 1, size = 50;

    const getJSON = async (path) => {
      const r = await fetch(`${API_BASE}${path}`);
      if (!r.ok) throw await r.json().catch(() => ({ reason: r.statusText }));
      return r.json();
    };
    const postJSON = async (path, body) => {
      const r = await fetch(`${API_BASE}${path}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body || {})
      });
      if (!r.ok) {
        const data = await r.json().catch(() => ({ reason: r.statusText }));
        const e = new Error(data.reason || "error");
        e.status = r.status; e.data = data; throw e;
      }
      return r.json();
    };
    const setStatus = (msg, cls = "") => {}; // ダミー（UIに表示しない）

    const escapeHtml = (s) =>
      (s ?? "").replace(/[&<>\"']/g, (m) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[m]));


    // 入力→保存（UIからサーバへ）: 何が来ても 'YYYY-MM-DD' or null に正規化
    function normYMD(input) {
      if (!input) return null;
      const s = input.trim();
      // すでに 'YYYY-MM-DD'
      let m = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if (m) return `${m[1]}-${m[2]}-${m[3]}`;
      // 'YYYY/MM/DD'
      m = s.match(/^(\d{4})\/(\d{1,2})\/(\d{1,2})$/);
      if (m) return `${m[1]}-${String(m[2]).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}`;
      // 'YYYY年MM月DD日'
      m = s.match(/^(\d{4})年(\d{1,2})月(\d{1,2})日$/);
      if (m) return `${m[1]}-${String(m[2]).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}`;
      // 'YYYY.MM.DD' なども一応吸収
      m = s.match(/^(\d{4})[.\s](\d{1,2})[.\s](\d{1,2})$/);
      if (m) return `${m[1]}-${String(m[2]).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}`;
      return null; // 不明は null（サーバは NULL/空を許可）
    }

    // サーバ→入力（サーバからUIへ）: input[type=date] に代入できる 'YYYY-MM-DD' へ
    function toInputDate(s) {
      if (!s) return "";
      // 'YYYY-MM-DD' ならそのまま
      if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
      // 他形式は norm してから
      return normYMD(s) || "";
    }



    // ===== 一覧の描画 =====
    async function reload() {
      const q = $("#q")?.value?.trim() || "";
      const data = await getJSON(
        `/owner/api/era/list?u=${u}&p=${p}&page=${page}&size=${size}&q=${encodeURIComponent(q)}`
      );
      listTbody.innerHTML = "";
      for (const it of data.items || []) {
        const tr = document.createElement("tr");
        tr.innerHTML = `<td>${it.id}</td><td>${escapeHtml(it.name)}</td>`;
        tr.onclick = () => select(it.id);
        if (cur?.id === it.id) tr.classList.add("active");
        listTbody.appendChild(tr);
      }
    }

    // ===== 明細の取得/セット =====
    async function select(id) {
      const data = await getJSON(`/owner/api/era/get?u=${u}&p=${p}&id=${id}`);
      cur = data;
      $("#f-id").value = data.id ?? "";
      $("#f-title").value = data.name ?? "";
      $("#f-start").value = toInputDate(data.start_on);
      $("#f-end").value   = toInputDate(data.end_on);
      $("#f-memo").value  = data.memo ?? "";
      $$("#list tr").forEach(tr =>
        tr.classList.toggle("active", Number(tr.firstChild.textContent) === id)
      );
    }

    // ===== 新規/保存/削除 =====
    function newItem() {
      cur = {
        id: "",
        name: "",
        start_on: "",
        end_on: "",
        memo: ""
      };

      $("#f-id").value    = "";
      $("#f-title").value = "";      // 主フィールド（name）を入れる
      $("#f-start").value = "";
      $("#f-end").value   = "";
      $("#f-memo").value  = "";

      $("#f-title").focus();
    }


    // 例：era.html
    async function save() {
      const name  = $("#f-title").value.trim();
      const start = normYMD($("#f-start").value);
      const end   = normYMD($("#f-end").value);
      const memo  = $("#f-memo").value.trim() || null;

      if (!name) return;

      try {
        if (!cur?.id) {
          cur = await postJSON(`/owner/api/era/create?u=${u}&p=${p}`, {
            name, start_on: start, end_on: end, memo
          });
        } else {
          await postJSON(`/owner/api/era/update?u=${u}&p=${p}`, {
            id: cur.id, name, start_on: start, end_on: end, memo
          });
        }
        await reload();
      } catch {}
    }


    async function del() {
      if (!cur?.id) return;
      if (!confirm(`ID ${cur.id} を削除します。よろしいですか？`)) return;
      try {
        await postJSON(`/owner/api/era/delete?u=${u}&p=${p}`, { id: cur.id });
        cur = null;
        newItem();
        await reload();
        window.dispatchEvent(new CustomEvent("master-changed", { detail: { kind: "era" } }));
      } catch (e) {
        // 409/その他は無視（UIに出さない運用）
      }
    }

    // ===== ハンドラ結線（クリックのみ） =====
    $("#btn-search").onclick = () => { page = 1; reload(); };
    $("#btn-reload").onclick = () => reload();
    $("#btn-new").onclick    = () => newItem();
    $("#btn-save").onclick   = () => save();
    $("#btn-delete").onclick = () => del();

    // ===== 初期ロード =====
    await reload();
    newItem();
  </script>
</body>
</html>
